name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Derive version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "Tag must look like v1.0.12" >&2
            exit 1
          fi
          IFS=. read -r MAJOR MINOR PATCH <<< "$VERSION"
          BUILD=$(( MAJOR * 1000000 + MINOR * 1000 + PATCH ))
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "dmg_name=WorkScreenTimeApp-$VERSION.dmg" >> "$GITHUB_OUTPUT"

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Test
        run: swift test

      - name: Build app dmg
        shell: bash
        run: |
          set -euo pipefail
          brew install create-dmg
          DMG_PATH="$RUNNER_TEMP/${{ steps.version.outputs.dmg_name }}"
          scripts/build_app.sh \
            --version "${{ steps.version.outputs.version }}" \
            --build "${{ steps.version.outputs.build }}" \
            --dmg "$DMG_PATH"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          ASSET_LABEL="${DMG_PATH}#${{ steps.version.outputs.dmg_name }}"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$ASSET_LABEL" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$ASSET_LABEL" \
              --title "Work Screen Time ${{ steps.version.outputs.version }}" \
              --generate-notes
          fi

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SPARKLE_PRIVATE_KEY:-}" ]]; then
            echo "Missing GitHub Actions secret SPARKLE_PRIVATE_KEY" >&2
            exit 1
          fi

          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${{ steps.version.outputs.dmg_name }}"
          
          # Generate clean HTML release notes for Sparkle
          mkdir -p website/static/release-notes
          NOTES_FILENAME="release-notes-${{ steps.version.outputs.version }}.html"
          scripts/generate_sparkle_notes.sh "${{ steps.version.outputs.version }}" "$GITHUB_REF_NAME" "website/static/release-notes/$NOTES_FILENAME"
          
          # Pass the hosted HTML URL to Sparkle appcast
          RELEASE_NOTES_URL="https://mrkhntr.com/work-screen-time-monitor/release-notes/$NOTES_FILENAME"
          
          scripts/create_appcast.sh \
            --version "${{ steps.version.outputs.version }}" \
            --build "${{ steps.version.outputs.build }}" \
            --zip "$ZIP_PATH" \
            --download-url "$DOWNLOAD_URL" \
            --release-notes-url "$RELEASE_NOTES_URL" \
            --output "$RUNNER_TEMP/appcast.xml" \
            --sign-update ".build/artifacts/sparkle/Sparkle/bin/sign_update"

      - name: Build Docusaurus download site
        working-directory: website
        env:
          WORK_SCREEN_TIME_VERSION: ${{ steps.version.outputs.version }}
          WORK_SCREEN_TIME_DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.version.outputs.zip_name }}
          WORK_SCREEN_TIME_RELEASE_NOTES_URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          cp "$RUNNER_TEMP/appcast.xml" static/appcast.xml
          npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

      - name: Deploy download page to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
