name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "Tag must look like v1.0.12" >&2
            exit 1
          fi
          IFS=. read -r MAJOR MINOR PATCH <<< "$VERSION"
          BUILD=$(( MAJOR * 1000000 + MINOR * 1000 + PATCH ))
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "zip_name=WorkScreenTimeApp-$VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Test
        run: swift test

      - name: Build app zip
        shell: bash
        run: |
          set -euo pipefail
          ZIP_PATH="$RUNNER_TEMP/${{ steps.version.outputs.zip_name }}"
          scripts/build_app.sh \
            --version "${{ steps.version.outputs.version }}" \
            --build "${{ steps.version.outputs.build }}" \
            --zip "$ZIP_PATH"
          echo "ZIP_PATH=$ZIP_PATH" >> "$GITHUB_ENV"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          ASSET_LABEL="${ZIP_PATH}#${{ steps.version.outputs.zip_name }}"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$ASSET_LABEL" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$ASSET_LABEL" \
              --title "Work Screen Time ${{ steps.version.outputs.version }}" \
              --generate-notes
          fi

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SPARKLE_PRIVATE_KEY:-}" ]]; then
            echo "Missing GitHub Actions secret SPARKLE_PRIVATE_KEY" >&2
            exit 1
          fi

          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${{ steps.version.outputs.zip_name }}"
          RELEASE_NOTES_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          scripts/create_appcast.sh \
            --version "${{ steps.version.outputs.version }}" \
            --build "${{ steps.version.outputs.build }}" \
            --zip "$ZIP_PATH" \
            --download-url "$DOWNLOAD_URL" \
            --release-notes-url "$RELEASE_NOTES_URL" \
            --output "$RUNNER_TEMP/appcast.xml" \
            --sign-update ".build/artifacts/sparkle/Sparkle/bin/sign_update"

      - name: Prepare GitHub Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          PAGES_DIR="$RUNNER_TEMP/pages"
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${{ steps.version.outputs.zip_name }}"
          RELEASE_NOTES_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          scripts/create_pages_site.sh \
            --output "$PAGES_DIR" \
            --appcast "$RUNNER_TEMP/appcast.xml" \
            --version "${{ steps.version.outputs.version }}" \
            --download-url "$DOWNLOAD_URL" \
            --release-notes-url "$RELEASE_NOTES_URL"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/pages

      - name: Deploy download page to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
